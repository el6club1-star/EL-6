<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA ELITE v5.8 - CLUB PRIVADO EL 6</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --gold: #d4af37; --bg: #ffffff; --card: #f8fafc; --text: #1e293b; --success: #22c55e; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        #pantallaLogin { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 99999; display: flex; justify-content: center; align-items: center; flex-direction: column; color: var(--gold); }
        #pantallaLogin input { padding: 15px; border: 1px solid var(--gold); background: #111; color: white; border-radius: 8px; text-align: center; margin-bottom: 15px; width: 250px; font-size: 20px; }
        .btn-logout { position: fixed; top: 20px; right: 20px; background: #000; color: #ef4444; border: 1px solid #ef4444; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; z-index: 10001; }
        .container { max-width: 1250px; margin: auto; background: var(--card); padding: 30px; border-radius: 24px; border: 1px solid #e2e8f0; display:none; }
        header { text-align: center; border-bottom: 2px solid var(--gold); margin-bottom: 30px; padding-bottom: 15px; position: relative; }
        header h1 { letter-spacing: 8px; text-transform: uppercase; margin: 0; font-size: 32px; font-weight: 800; }
        .stats-container { display: none; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .stat-card { background: #000; color: white; padding: 20px; border-radius: 15px; text-align: center; border-bottom: 4px solid var(--gold); }
        .stat-card p { margin: 10px 0 0; font-size: 32px; font-weight: 900; }
        .reg-box { display: grid; grid-template-columns: 1fr 1.5fr 1fr 1fr 1fr auto; gap: 12px; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #e2e8f0; background: rgba(0,0,0,0.02); align-items: end; }
        input, select { padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; width: 100%; box-sizing: border-box; }
        .btn-add { background: var(--gold); color: white; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: 800; height: 46px; text-transform: uppercase; }
        .search-input { border: 2px solid var(--gold) !important; font-weight: bold; width: 100%; padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: var(--gold); font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #e2e8f0; }
        td { padding: 18px 15px; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        #modalTarjeta { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 5000; justify-content: center; align-items: center; flex-direction: column; overflow-y: auto; padding: 20px 0; }
        .card-vip { width: 320px; background: #000; border: 2px solid var(--gold); border-radius: 20px; padding: 25px; text-align: center; color: white; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #qr-space { background: white; padding: 10px; margin: 15px 0; display: inline-block; border-radius: 10px; }
        .card-actions { display: flex; gap: 10px; margin-top: 15px; width: 320px; }
        .btn-card { flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 10px; text-transform: uppercase; }
        .btn-send { background: var(--gold); color: black; }
        .rgpd-box { grid-column: 1 / -1; display: flex; align-items: center; gap: 10px; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="pantallaLogin">
        <h1 style="letter-spacing: 10px;">EL 6</h1>
        <input type="password" id="passApp" placeholder="CÓDIGO">
        <button onclick="validarEntrada()" style="background:var(--gold); border:none; padding:12px 50px; border-radius:8px; cursor:pointer; font-weight:bold; color:white;">ACCEDER</button>
    </div>

    <button class="btn-logout" id="btnLogout" style="display:none;" onclick="cerrarSesion()">CERRAR SESIÓN 🚪</button>

    <div class="container" id="principal">
        <header>
            <h1>⚜️ CLUB PRIVADO EL 6 ⚜️</h1>
        </header>

        <div class="reg-box">
            <div><label style="font-size:11px; font-weight:bold;">ID / DNI</label><input type="text" id="dni" placeholder="PASE LECTOR" oninput="this.value = this.value.toUpperCase();"></div>
            <div><label style="font-size:11px; font-weight:bold;">NOMBRE</label><input type="text" id="nom" placeholder="NOMBRE Y APELLIDOS"></div>
            <div><label style="font-size:11px; font-weight:bold;">EMAIL</label><input type="email" id="mail" placeholder="CORREO"></div>
            <div><label style="font-size:11px; font-weight:bold;">TIPO</label>
                <select id="cat">
                    <option>Estándar</option><option>Socio Plus</option><option>VIP Plata</option><option>VIP Gold</option><option>Elite</option>
                </select>
            </div>
            <button class="btn-add" onclick="registrar()">REGISTRAR</button>
            <div class="rgpd-box">
                <input type="checkbox" id="checkRGPD" checked>
                <label for="checkRGPD">Acepto los estatutos y privacidad.</label>
            </div>
        </div>

        <input type="text" id="buscador" class="search-input" placeholder="🔍 BUSCAR SOCIO..." onkeyup="render()">

        <table>
            <thead><tr><th>ID</th><th>NOMBRE</th><th>CATEGORÍA</th><th>ACCIONES</th></tr></thead>
            <tbody id="lista"></tbody>
        </table>
    </div>

    <div id="modalTarjeta">
        <div class="card-vip" id="cardMain">
            <h2 style="font-size:16px; margin:0;">CLUB PRIVADO EL 6</h2>
            <div id="card-id" style="font-size:32px; font-weight:900; margin:5px 0;">Nº 000</div>
            <div id="qr-space"></div>
            <div style="text-align:left; font-size:11px; border-top:1px solid rgba(255,255,255,0.2); padding-top:10px;">
                <p>SOCIO: <span id="card-nom" style="float:right; font-weight:bold;">---</span></p>
                <p>DNI: <span id="card-dni" style="float:right; font-weight:bold;">---</span></p>
            </div>
        </div>

        <div class="card-actions">
            <button class="btn-card btn-send" onclick="descargarTarjeta()">ENVIAR TARJETA</button>
            <button class="btn-card" style="background:white;" onclick="cerrar()">CERRAR</button>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://rmskjegarvntuqpfzfbm.supabase.co';
        const supabaseKey = 'sb_publishable_hEqxPZNGDxpNZEnz7hrymg_cL8GvwHK';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
        const NOMBRE_TABLA = 'socios';

        let db = []; let socioActual = null;

        async function refrescarDatos() {
            try {
                const { data, error } = await _supabase.from(NOMBRE_TABLA).select('*').order('created_at', { ascending: false });
                if(!error) { db = data; render(); }
            } catch (e) { console.error("Error cargando base de datos"); }
        }

        function validarEntrada() {
            const p = document.getElementById('passApp').value;
            if(p === "1234" || p === "0000") {
                document.getElementById('pantallaLogin').style.display='none';
                document.getElementById('principal').style.display='block';
                document.getElementById('btnLogout').style.display='block';
                refrescarDatos();
            } else { alert("CÓDIGO INCORRECTO"); }
        }

        async function registrar() {
            const dniVal = document.getElementById('dni').value.trim().toUpperCase();
            const nomVal = document.getElementById('nom').value.trim();
            if(!dniVal || !nomVal) return alert("RELLENA DNI Y NOMBRE");

            await _supabase.from(NOMBRE_TABLA).upsert([{ 
                dni: dniVal, nombre: nomVal, cat: document.getElementById('cat').value, dentro: true 
            }]);
            
            await refrescarDatos();
            const s = db.find(x => x.dni === dniVal);
            abrirTarjeta(s);
        }

        function render() {
            const b = document.getElementById('buscador').value.toLowerCase();
            const f = db.filter(x => (x.nombre||"").toLowerCase().includes(b) || (x.dni||"").toLowerCase().includes(b));
            document.getElementById('lista').innerHTML = f.map(s => `
                <tr>
                    <td>${s.dni}</td><td>${s.nombre}</td><td>${s.cat}</td>
                    <td><button onclick="reAbrir('${s.dni}')">VER TARJETA</button></td>
                </tr>`).join('');
        }

        function abrirTarjeta(s) {
            if(!s) return;
            socioActual = s;
            document.getElementById('card-id').innerText = "Nº " + (s.id || "0");
            document.getElementById('card-nom').innerText = s.nombre;
            document.getElementById('card-dni').innerText = s.dni;
            
            // Generar QR
            document.getElementById('qr-space').innerHTML = "";
            const qr = new QRious({ value: s.dni, size: 150 });
            const img = document.createElement('img');
            img.src = qr.toDataURL();
            document.getElementById('qr-space').appendChild(img);
            
            document.getElementById('modalTarjeta').style.display = 'flex';
        }

        function descargarTarjeta() {
            const node = document.getElementById('cardMain');
            
            // En CodePen a veces html2canvas necesita un empujón
            html2canvas(node, {
                scale: 2,
                backgroundColor: "#000000",
                logging: false,
                useCORS: true
            }).then(canvas => {
                const dataUrl = canvas.toDataURL("image/png");
                const link = document.createElement('a');
                link.download = `Tarjeta_${socioActual.dni}.png`;
                link.href = dataUrl;
                // Esto es necesario para que funcione en Firefox/Chrome dentro de CodePen
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }).catch(err => {
                console.error("Error al capturar imagen:", err);
                alert("Error al generar la imagen. Inténtalo de nuevo.");
            });
        }

        function reAbrir(dni) { abrirTarjeta(db.find(x => x.dni === dni)); }
        function cerrar() { document.getElementById('modalTarjeta').style.display='none'; }
        function cerrarSesion() { location.href = location.href; }
    </script>
</body>
</html>
