<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA ELITE V6.0 - CLUB PRIVADO EL 6</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #d4af37; --bg: #ffffff; --card: #f8fafc; --text: #1e293b; --success: #22c55e; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        #pantallaLogin { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 99999; display: flex; justify-content: center; align-items: center; flex-direction: column; color: var(--gold); }
        #pantallaLogin input { padding: 15px; border: 1px solid var(--gold); background: #111; color: white; border-radius: 8px; text-align: center; margin-bottom: 15px; width: 250px; font-size: 20px; }
        .btn-logout { position: fixed; top: 20px; right: 20px; background: #000; color: #ef4444; border: 1px solid #ef4444; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; z-index: 10001; }
        .container { max-width: 1250px; margin: auto; background: var(--card); padding: 30px; border-radius: 24px; border: 1px solid #e2e8f0; display:none; }
        header { text-align: center; border-bottom: 2px solid var(--gold); margin-bottom: 30px; padding-bottom: 15px; position: relative; }
        header h1 { letter-spacing: 8px; text-transform: uppercase; margin: 0; font-size: 32px; font-weight: 800; }
        .stats-container { display: none; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .stat-card { background: #000; color: white; padding: 20px; border-radius: 15px; text-align: center; border-bottom: 4px solid var(--gold); }
        .stat-card p { margin: 10px 0 0; font-size: 32px; font-weight: 900; }
        .reg-box { display: grid; grid-template-columns: 1fr 1.5fr 1fr 1fr 1fr auto; gap: 12px; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #e2e8f0; background: rgba(0,0,0,0.02); align-items: end; }
        input, select { padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; width: 100%; box-sizing: border-box; }
        .btn-add { background: var(--gold); color: white; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: 800; height: 46px; text-transform: uppercase; }
        .search-input { border: 2px solid var(--gold) !important; font-weight: bold; width: 100%; padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: var(--gold); font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #e2e8f0; }
        td { padding: 18px 15px; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        #modalTarjeta { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 5000; justify-content: center; align-items: center; flex-direction: column; overflow-y: auto; padding: 20px 0; }
        .card-vip { width: 320px; background: #000; border: 2px solid var(--gold); border-radius: 20px; padding: 25px; text-align: center; color: white; position: relative; }
        #box-firma { background: white; padding: 15px; border-radius: 15px; margin-top: 10px; width: 350px; color: #000; }
        canvas#canvasFirma { border: 1px dashed #000; background: #fff; width: 100%; height: 100px; touch-action: none; }
    </style>
</head>
<body>

    <div id="pantallaLogin">
        <h1 style="letter-spacing: 10px;">EL 6</h1>
        <input type="password" id="passApp" placeholder="CÓDIGO">
        <button onclick="validarEntrada()" style="background:var(--gold); border:none; padding:12px 50px; border-radius:8px; cursor:pointer; font-weight:bold; color:white;">ACCEDER</button>
    </div>

    <button class="btn-logout" id="btnLogout" style="display:none;" onclick="location.reload()">CERRAR SESIÓN 🚪</button>

    <div class="container" id="principal">
        <header>
            <h1>⚜️ CLUB PRIVADO EL 6 ⚜️</h1>
        </header>

        <div id="panelAdmin" class="stats-container">
            <div class="stat-card"><h3>SOCIOS</h3><p id="st-total">0</p></div>
            <div class="stat-card"><h3>AFORO</h3><p id="st-aforo">0</p></div>
            <div class="stat-card"><h3>VETADOS</h3><p id="st-vetados" style="color:var(--danger);">0</p></div>
        </div>

        <div class="reg-box">
            <div><label>ID / DNI</label><input type="text" id="dni" oninput="this.value=this.value.toUpperCase()"></div>
            <div><label>NOMBRE</label><input type="text" id="nom"></div>
            <div><label>EMAIL</label><input type="email" id="mail"></div>
            <div><label>TIPO</label>
                <select id="cat">
                    <option>Estándar</option><option>Socio Plus</option><option>VIP Plata</option><option>VIP Gold</option><option>Elite</option>
                </select>
            </div>
            <button class="btn-add" onclick="abrirFirma()">REGISTRAR</button>
        </div>

        <input type="text" id="buscador" class="search-input" placeholder="🔍 BUSCAR POR NOMBRE O DNI..." onkeyup="render()">

        <table>
            <thead><tr><th>DNI</th><th>NOMBRE</th><th>CATEGORÍA</th><th>ESTADO</th><th>ACCIONES</th></tr></thead>
            <tbody id="lista"></tbody>
        </table>
    </div>

    <div id="modalTarjeta">
        <div id="box-firma">
            <h3 style="text-align:center;">ACEPTAR ESTATUTOS</h3>
            <div style="font-size:9px; height:100px; overflow-y:scroll; border:1px solid #ccc; padding:5px; margin-bottom:10px;">
                [CONTRATO LEGAL DEL CLUB EL 6 - ACEPTACIÓN DE NORMAS Y PRIVACIDAD]
            </div>
            <canvas id="canvasFirma" width="320" height="100"></canvas>
            <button onclick="guardarTodo()" style="width:100%; padding:15px; background:var(--gold); color:white; border:none; border-radius:8px; margin-top:10px; font-weight:bold;">FIRMAR Y REGISTRAR</button>
            <button onclick="cerrar()" style="width:100%; margin-top:5px; border:none; background:#eee;">CANCELAR</button>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://rmskjegarvntuqpfzfbm.supabase.co';
        const supabaseKey = 'sb_publishable_hEqxPZNGDxpNZEnz7hrymg_cL8GvwHK';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let db = [];
        let nivel = "personal";
        const canvas = document.getElementById('canvasFirma');
        const ctx = canvas.getContext('2d');
        let dibujando = false;

        async function cargarDatos() {
            const { data, error } = await _supabase.from('socios').select('*').order('created_at', { ascending: false });
            if (!error) { db = data; render(); }
        }

        function validarEntrada() {
            const p = document.getElementById('passApp').value;
            if(p === "1234") { nivel = "jefe"; mostrarApp(); }
            else if(p === "0000") { nivel = "personal"; mostrarApp(); }
            else alert("CÓDIGO INCORRECTO");
        }

        function mostrarApp() {
            document.getElementById('pantallaLogin').style.display='none';
            document.getElementById('principal').style.display='block';
            document.getElementById('btnLogout').style.display='block';
            if(nivel === "jefe") document.getElementById('panelAdmin').style.display='grid';
            cargarDatos();
        }

        function abrirFirma() {
            if(!document.getElementById('dni').value || !document.getElementById('nom').value) return alert("Faltan datos");
            document.getElementById('modalTarjeta').style.display = 'flex';
            ctx.clearRect(0,0,canvas.width,canvas.height);
        }

        async function guardarTodo() {
            const nuevo = {
                dni: document.getElementById('dni').value.toUpperCase(),
                nombre: document.getElementById('nom').value,
                email: document.getElementById('mail').value,
                cat: document.getElementById('cat').value,
                firma: canvas.toDataURL(),
                dentro: true,
                hora: new Date().toLocaleTimeString()
            };

            const { error } = await _supabase.from('socios').insert([nuevo]);
            if(error) alert("Error al guardar: " + error.message);
            else {
                cerrar();
                document.getElementById('dni').value=""; document.getElementById('nom').value="";
                cargarDatos();
            }
        }

        async function toggleEntrada(id, estado) {
            await _supabase.from('socios').update({ dentro: !estado }).eq('id', id);
            cargarDatos();
        }

        async function borrar(id) {
            if(confirm("¿BORRAR SOCIO?")) {
                await _supabase.from('socios').delete().eq('id', id);
                cargarDatos();
            }
        }

        function render() {
            const bus = document.getElementById('buscador').value.toLowerCase();
            const f = db.filter(x => x.nombre.toLowerCase().includes(bus) || x.dni.toLowerCase().includes(bus));

            document.getElementById('st-total').innerText = db.length;
            document.getElementById('st-aforo').innerText = db.filter(x => x.dentro).length;
            document.getElementById('st-vetados').innerText = db.filter(x => x.vetado).length;

            document.getElementById('lista').innerHTML = f.map(s => `
                <tr>
                    <td>${nivel === 'jefe' ? s.dni : '***OCULTO***'}</td>
                    <td>${s.nombre}</td>
                    <td>${s.cat}</td>
                    <td onclick="toggleEntrada(${s.id}, ${s.dentro})" style="cursor:pointer">
                        ${s.dentro ? '🟢 DENTRO' : '⚪ FUERA'}
                    </td>
                    <td>
                        <button onclick="toggleEntrada(${s.id}, ${s.dentro})">🚪</button>
                        ${nivel === 'jefe' ? `<button onclick="borrar(${s.id})">🗑️</button>` : ''}
                    </td>
                </tr>
            `).join('');
        }

        function cerrar() { document.getElementById('modalTarjeta').style.display='none'; }

        // Lógica de Firma (Tactil y Ratón)
        const getP = (e) => {
            const r = canvas.getBoundingClientRect();
            return { x: (e.clientX || e.touches[0].clientX) - r.left, y: (e.clientY || e.touches[0].clientY) - r.top };
        };
        canvas.addEventListener('mousedown', (e) => { dibujando = true; ctx.beginPath(); const p = getP(e); ctx.moveTo(p.x, p.y); });
        canvas.addEventListener('mousemove', (e) => { if(dibujando) { const p = getP(e); ctx.lineTo(p.x, p.y); ctx.stroke(); } });
        window.addEventListener('mouseup', () => dibujando = false);
        canvas.addEventListener('touchstart', (e) => { dibujando = true; ctx.beginPath(); const p = getP(e); ctx.moveTo(p.x, p.y); });
        canvas.addEventListener('touchmove', (e) => { if(dibujando) { e.preventDefault(); const p = getP(e); ctx.lineTo(p.x, p.y); ctx.stroke(); } });
    </script>
</body>
</html>
