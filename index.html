<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA ELITE V5.8 - CLUB PRIVADO EL 6</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #d4af37; --bg: #ffffff; --card: #f8fafc; --text: #1e293b; --success: #22c55e; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        #pantallaLogin { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 99999; display: flex; justify-content: center; align-items: center; flex-direction: column; color: var(--gold); }
        #pantallaLogin input { padding: 15px; border: 1px solid var(--gold); background: #111; color: white; border-radius: 8px; text-align: center; margin-bottom: 15px; width: 250px; font-size: 20px; }
        .container { max-width: 1250px; margin: auto; background: var(--card); padding: 30px; border-radius: 24px; border: 1px solid #e2e8f0; display:none; }
        header { text-align: center; border-bottom: 2px solid var(--gold); margin-bottom: 30px; padding-bottom: 15px; }
        header h1 { letter-spacing: 8px; text-transform: uppercase; margin: 0; font-size: 32px; font-weight: 800; }
        .stats-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .stat-card { background: #000; color: white; padding: 20px; border-radius: 15px; text-align: center; border-bottom: 4px solid var(--gold); }
        .stat-card p { margin: 10px 0 0; font-size: 32px; font-weight: 900; }
        .reg-box { display: grid; grid-template-columns: 1fr 1.5fr 1fr 1fr auto; gap: 12px; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #e2e8f0; background: rgba(0,0,0,0.02); align-items: end; }
        input, select { padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; width: 100%; box-sizing: border-box; }
        .btn-add { background: var(--gold); color: white; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: 800; height: 46px; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; color: var(--gold); font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #e2e8f0; }
        td { padding: 15px; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        #modalFirma { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; }
        .box-firma { background: white; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
        canvas { border: 1px dashed #000; background: #fff; touch-action: none; width: 100%; height: 150px; }
        .texto-legal { font-size: 10px; height: 100px; overflow-y: scroll; border: 1px solid #ddd; padding: 10px; text-align: justify; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="pantallaLogin">
        <h1 style="letter-spacing: 10px;">EL 6</h1>
        <input type="password" id="passApp" placeholder="CÓDIGO">
        <button onclick="validarEntrada()" style="background:var(--gold); border:none; padding:12px 50px; border-radius:8px; cursor:pointer; font-weight:bold; color:white;">ACCEDER</button>
    </div>

    <div class="container" id="principal">
        <header>
            <h1>⚜️ CLUB PRIVADO EL 6 ⚜️</h1>
        </header>

        <div class="stats-container">
            <div class="stat-card"><h3>SOCIOS</h3><p id="st-total">0</p></div>
            <div class="stat-card"><h3>DENTRO</h3><p id="st-aforo">0</p></div>
            <div class="stat-card"><h3>VETADOS</h3><p id="st-vetados" style="color:var(--danger);">0</p></div>
        </div>

        <div class="reg-box">
            <div><label>DNI</label><input type="text" id="dni" oninput="this.value=this.value.toUpperCase()"></div>
            <div><label>NOMBRE</label><input type="text" id="nom"></div>
            <div><label>EMAIL</label><input type="email" id="mail"></div>
            <div><label>CATEGORÍA</label>
                <select id="cat">
                    <option>Estándar</option><option>Socio Plus</option><option>VIP Plata</option><option>VIP Gold</option><option>Elite</option>
                </select>
            </div>
            <button class="btn-add" onclick="abrirFirma()">REGISTRAR</button>
        </div>

        <table>
            <thead><tr><th>DNI</th><th>NOMBRE</th><th>ESTADO</th><th>FIRMA</th><th>ACCIONES</th></tr></thead>
            <tbody id="lista"></tbody>
        </table>
    </div>

    <div id="modalFirma">
        <div class="box-firma">
            <h3>ACEPTAR ESTATUTOS</h3>
            <div class="texto-legal">
                1. El socio acepta cumplir las normas del Club El 6.<br>
                2. Los datos se tratarán conforme al RGPD.<br>
                3. La dirección se reserva el derecho de admisión...
            </div>
            <canvas id="canvasFirma" width="350" height="150"></canvas>
            <button onclick="guardarEnSupabase()" style="width:100%; padding:15px; background:var(--gold); color:white; border:none; border-radius:8px; margin-top:10px; font-weight:bold; cursor:pointer;">FIRMAR Y FINALIZAR</button>
            <button onclick="cerrarFirma()" style="margin-top:10px; background:none; border:none; color:gray; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://rmskjegarvntuqpfzfbm.supabase.co';
        const supabaseKey = 'sb_publishable_hEqxPZNGDxpNZEnz7hrymg_cL8GvwHK';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let dbLocal = [];
        const canvas = document.getElementById('canvasFirma');
        const ctx = canvas.getContext('2d');
        let dibujando = false;

        async function cargarDatos() {
            const { data, error } = await _supabase.from('socios').select('*').order('created_at', { ascending: false });
            if (!error) { dbLocal = data; render(); }
        }

        function validarEntrada() {
            if(document.getElementById('passApp').value === "1234") {
                document.getElementById('pantallaLogin').style.display='none';
                document.getElementById('principal').style.display='block';
                cargarDatos();
            } else { alert("Código incorrecto"); }
        }

        function abrirFirma() {
            if(!document.getElementById('dni').value || !document.getElementById('nom').value) return alert("Faltan datos");
            document.getElementById('modalFirma').style.display = 'flex';
            ctx.clearRect(0,0,canvas.width,canvas.height);
        }

        function cerrarFirma() { document.getElementById('modalFirma').style.display='none'; }

        async function guardarEnSupabase() {
            const nuevoSocio = {
                dni: document.getElementById('dni').value,
                nombre: document.getElementById('nom').value,
                "correo electrónico": document.getElementById('mail').value, // Coincide con tu captura
                firma: canvas.toDataURL(),
                dentro: true
            };

            const { error } = await _supabase.from('socios').insert([nuevoSocio]);
            if (error) { 
                alert("Error: " + error.message); 
            } else {
                alert("¡Socio registrado con éxito!");
                cerrarFirma();
                document.getElementById('dni').value = "";
                document.getElementById('nom').value = "";
                cargarDatos();
            }
        }

        async function toggleEntrada(id, estado) {
            await _supabase.from('socios').update({ dentro: !estado }).eq('id', id);
            cargarDatos();
        }

        function render() {
            document.getElementById('st-total').innerText = dbLocal.length;
            document.getElementById('st-aforo').innerText = dbLocal.filter(x => x.dentro).length;
            document.getElementById('st-vetados').innerText = dbLocal.filter(x => x.vetado).length;

            document.getElementById('lista').innerHTML = dbLocal.map(s => `
                <tr>
                    <td>${s.dni}</td>
                    <td>${s.nombre}</td>
                    <td onclick="toggleEntrada(${s.id}, ${s.dentro})" style="cursor:pointer">${s.dentro ? '🟢 DENTRO' : '⚪ FUERA'}</td>
                    <td><img src="${s.firma}" height="30" style="background:white; border:1px solid #eee;"></td>
                    <td><button onclick="toggleEntrada(${s.id}, ${s.dentro})">Cambiar Estado</button></td>
                </tr>
            `).join('');
        }

        // Lógica del lienzo de firma
        const getP = (e) => {
            const r = canvas.getBoundingClientRect();
            const clientX = e.clientX || e.touches[0].clientX;
            const clientY = e.clientY || e.touches[0].clientY;
            return { x: clientX - r.left, y: clientY - r.top };
        };
        const start = (e) => { dibujando = true; ctx.beginPath(); const p = getP(e); ctx.moveTo(p.x, p.y); };
        const move = (e) => { if (dibujando) { e.preventDefault(); const p = getP(e); ctx.lineTo(p.x, p.y); ctx.stroke(); } };
        const stop = () => { dibujando = false; };

        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', move);
        window.addEventListener('mouseup', stop);
        canvas.addEventListener('touchstart', start);
        canvas.addEventListener('touchmove', move);
        canvas.addEventListener('touchend', stop);
    </script>
</body>
</html>
