<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA ELITE v6.1 - CLUB PRIVADO EL 6</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #d4af37; --bg: #ffffff; --card: #f8fafc; --text: #1e293b; --success: #22c55e; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        #pantallaLogin { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 99999; display: flex; justify-content: center; align-items: center; flex-direction: column; color: var(--gold); }
        #pantallaLogin input { padding: 15px; border: 1px solid var(--gold); background: #111; color: white; border-radius: 8px; text-align: center; margin-bottom: 15px; width: 250px; font-size: 20px; }
        .btn-logout { position: fixed; top: 20px; right: 20px; background: #000; color: #ef4444; border: 1px solid #ef4444; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; z-index: 10001; }
        .container { max-width: 1250px; margin: auto; background: var(--card); padding: 30px; border-radius: 24px; border: 1px solid #e2e8f0; display:none; }
        header { text-align: center; border-bottom: 2px solid var(--gold); margin-bottom: 30px; padding-bottom: 15px; }
        header h1 { letter-spacing: 8px; text-transform: uppercase; margin: 0; font-size: 32px; font-weight: 800; }
        .stats-container { display: none; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .stat-card { background: #000; color: white; padding: 20px; border-radius: 15px; text-align: center; border-bottom: 4px solid var(--gold); }
        .stat-card p { margin: 10px 0 0; font-size: 32px; font-weight: 900; }
        .reg-box { display: grid; grid-template-columns: 1fr 1.5fr 1fr 1fr 1fr auto; gap: 12px; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #e2e8f0; background: rgba(0,0,0,0.02); align-items: end; }
        input, select { padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; width: 100%; box-sizing: border-box; }
        .btn-add { background: var(--gold); color: white; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: 800; height: 46px; text-transform: uppercase; }
        .rgpd-box { grid-column: 1 / 3; display: flex; align-items: center; gap: 10px; font-size: 11px; margin-top: 5px; justify-content: flex-start; }
        .search-input { border: 2px solid var(--gold) !important; font-weight: bold; width: 100%; padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: var(--gold); font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #e2e8f0; }
        td { padding: 18px 15px; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        .btn-acc { background: transparent; border: 1px solid #ccc; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 11px; padding: 6px 10px; text-transform: uppercase; }
        #modalTarjeta { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 5000; justify-content: center; align-items: center; flex-direction: column; overflow-y: auto; padding: 20px 0; }
        .card-vip { width: 320px; background: #000; border: 2px solid var(--gold); border-radius: 20px; padding: 25px; text-align: center; color: white; position: relative; overflow: hidden; }
        #selloPagado { display: none; position: absolute; top: 15px; right: -30px; background: var(--success); color: white; padding: 5px 40px; transform: rotate(45deg); font-size: 10px; font-weight: bold; }
        #qr-space { background: white; padding: 10px; margin: 15px 0; display: inline-block; border-radius: 10px; min-height: 140px; }
        .box-consumiciones { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); border-radius: 10px; padding: 10px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .btn-cant { background: var(--gold); color: black; border: none; width: 30px; height: 30px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .card-actions { display: flex; gap: 10px; margin-top: 15px; width: 320px; }
        .btn-card { flex: 1; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 10px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="pantallaLogin">
        <h1 style="letter-spacing: 10px;">EL 6</h1>
        <input type="password" id="passApp" placeholder="CÓDIGO">
        <button onclick="validarEntrada()" style="background:var(--gold); border:none; padding:12px 50px; border-radius:8px; cursor:pointer; font-weight:bold; color:white;">ACCEDER</button>
    </div>
    <button class="btn-logout" id="btnLogout" style="display:none;" onclick="cerrarSesion()">CERRAR SESIÓN 🚪</button>
    <div class="container" id="principal">
        <header><h1>⚜️ CLUB PRIVADO EL 6 ⚜️</h1></header>
        <div id="panelAdmin" class="stats-container">
            <div class="stat-card"><h3>TOTAL SOCIOS</h3><p id="st-total">0</p></div>
            <div class="stat-card"><h3>AFORO ACTUAL</h3><p id="st-aforo">0</p></div>
            <div class="stat-card"><h3>VETADOS</h3><p id="st-vetados" style="color:var(--danger);">0</p></div>
        </div>
        <div class="reg-box">
            <div><label style="font-size:11px; font-weight:bold;">ID / DNI</label><input type="text" id="dni" placeholder="PASE LECTOR" oninput="this.value = this.value.toUpperCase(); autocompletarSocio();"></div>
            <div><label style="font-size:11px; font-weight:bold;">NOMBRE</label><input type="text" id="nom" placeholder="NOMBRE Y APELLIDOS"></div>
            <div><label style="font-size:11px; font-weight:bold;">CUMPLE</label><input type="date" id="cumple"></div>
            <div><label style="font-size:11px; font-weight:bold;">EMAIL</label><input type="email" id="mail" placeholder="CORREO ELECTRÓNICO"></div>
            <div><label style="font-size:11px; font-weight:bold;">TIPO</label>
                <select id="cat">
                    <option>Estándar</option><option>Socio Plus</option><option>VIP Plata</option><option>VIP Gold</option><option>Elite</option>
                </select>
            </div>
            <button class="btn-add" onclick="registrar()">REGISTRAR</button>
            <div class="rgpd-box">
                <input type="checkbox" id="checkRGPD">
                <label for="checkRGPD">Acepto la Política de Privacidad y Estatutos.</label>
            </div>
        </div>
        <input type="text" id="buscador" class="search-input" placeholder="🔍 BUSCAR SOCIO..." onkeyup="render()">
        <table>
            <thead><tr><th>Nº SOCIO</th><th>ID</th><th>NOMBRE</th><th>CATEGORÍA</th><th>ESTADO</th><th>HORA</th><th>ACCIONES</th></tr></thead>
            <tbody id="lista"></tbody>
        </table>
    </div>
    <div id="modalTarjeta">
        <div class="card-vip" id="cardMain">
            <div id="selloPagado">PAGADO ✅</div>
            <h2 style="font-size:16px; margin:0;">CLUB PRIVADO EL 6</h2>
            <div id="card-id" style="font-size:32px; font-weight:900; margin:5px 0;"></div>
            <div id="qr-space"></div>
            <div class="box-consumiciones">
                <button class="btn-cant" onclick="modificarConsumos(-1)">-</button>
                <div style="font-size:11px;">CONSUMICIONES: <span id="card-consumos" style="font-weight:bold; font-size:16px;">0</span></div>
                <button class="btn-cant" onclick="modificarConsumos(1)">+</button>
            </div>
            <div style="text-align:left; font-size:11px; border-top:1px solid rgba(255,255,255,0.2); padding-top:5px;">
                <p>SOCIO: <span id="card-nom" style="float:right;">---</span></p>
                <p>DNI: <span id="card-dni" style="float:right;">---</span></p>
            </div>
        </div>
        <div class="card-actions">
            <button class="btn-card btn-pay" id="btnPagarTarjeta" onclick="marcarPago()">PAGAR</button>
            <button class="btn-card" style="background:var(--gold); color:black;" onclick="descargarTarjeta()">DESCARGAR</button>
            <button class="btn-card" style="background:#3b82f6; color:white;" onclick="cerrar()">CERRAR</button>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://rmskjegarvntuqpfzfbm.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtc2tqZWdhcnZudHVxcGZ6ZmJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTI5OTg0MDAsImV4cCI6MjAyODU3NDQwMH0.hEqxPZNGDxpNZEnz7hrymg_cL8GvwHK';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let db = []; let aforo = 0; let socioActual = null; let nivel = "personal";

        async function refrescarDatos() {
            const { data, error } = await _supabase.from('socios').select('*').order('created_at', { ascending: false });
            if(!error) { db = data; aforo = db.filter(x => x.dentro).length; render(); }
        }

        async function registrar() {
            const d = document.getElementById('dni').value.toUpperCase().trim();
            const n = document.getElementById('nom').value.trim();
            if(!d || !n) { alert("DNI y Nombre obligatorios"); return; }
            const h = new Date().toLocaleTimeString();
            const { data, error } = await _supabase.from('socios').upsert([{ 
                dni: d, nombre: n, cat: document.getElementById('cat').value,
                email: document.getElementById('mail').value, cumple: document.getElementById('cumple').value,
                dentro: true, hora: h 
            }], { onConflict: 'dni' }).select();
            if(error) { alert("Error: Clave de acceso denegada. Revisa Supabase."); return; }
            document.getElementById('dni').value = ""; document.getElementById('nom').value = "";
            document.getElementById('mail').value = ""; document.getElementById('cumple').value = "";
            document.getElementById('checkRGPD').checked = false;
            await refrescarDatos();
            abrirTarjeta(data[0]);
        }

        function abrirTarjeta(s) { 
            if(!s) return;
            socioActual = s; 
            const c = document.getElementById('cardMain');
            c.style.border = "2px solid var(--gold)";
            if(s.cat === "VIP Plata") { c.style.background = "linear-gradient(135deg, #71717a, #3f3f46)"; c.style.color = "white"; }
            else if(s.cat === "VIP Gold") { c.style.background = "linear-gradient(135deg, #d4af37, #92721a)"; c.style.color = "black"; }
            else if(s.cat === "Elite") { c.style.background = "linear-gradient(135deg, #1e293b, #000000)"; c.style.border = "2px solid #ef4444"; c.style.color = "white"; }
            else { c.style.background = "#000"; c.style.color = "white"; }
            document.getElementById('card-id').innerText = "Nº " + (s.id || "---"); 
            document.getElementById('card-nom').innerText = s.nombre; 
            document.getElementById('card-dni').innerText = s.dni; 
            document.getElementById('card-consumos').innerText = s.consumiciones || 0; 
            document.getElementById('selloPagado').style.display = s.pagado ? 'block' : 'none'; 
            document.getElementById('qr-space').innerHTML = ""; 
            const qr = new QRious({value: s.dni, size: 200}); 
            const img = new Image(); img.src = qr.toDataURL(); img.style.width="140px"; 
            document.getElementById('qr-space').appendChild(img); 
            document.getElementById('modalTarjeta').style.display = 'flex'; 
        }

        function validarEntrada() { const p = document.getElementById('passApp').value; if(p === "1234" || p === "0000") { nivel = (p === "1234" ? "jefe" : "personal"); entrar(); } else alert("Error"); }
        function entrar() { document.getElementById('pantallaLogin').style.display='none'; document.getElementById('principal').style.display='block'; document.getElementById('btnLogout').style.display='block'; if(nivel === 'jefe') document.getElementById('panelAdmin').style.display='grid'; refrescarDatos(); }
        function render() { 
            const bus = document.getElementById('buscador').value.toLowerCase();
            const fil = db.filter(s => s.nombre.toLowerCase().includes(bus) || s.dni.includes(bus));
            document.getElementById('st-total').innerText = db.length; 
            document.getElementById('st-aforo').innerText = aforo; 
            document.getElementById('lista').innerHTML = fil.map(s => `<tr><td>${s.id}</td><td>${s.dni}</td><td>${s.nombre}</td><td>${s.cat}</td><td>${s.dentro ? '🟢' : '⚪'}</td><td>${s.hora||'-'}</td><td><button class="btn-acc" onclick="reAbrir('${s.dni}')">VER</button></td></tr>`).join(''); 
        }
        function reAbrir(dni) { abrirTarjeta(db.find(x=>x.dni===dni)); }
        function cerrar() { document.getElementById('modalTarjeta').style.display='none'; }
        function cerrarSesion() { location.reload(); }
        async function marcarPago() { const n = !socioActual.pagado; await _supabase.from('socios').update({ pagado: n }).eq('dni', socioActual.dni); socioActual.pagado = n; document.getElementById('selloPagado').style.display = n ? 'block' : 'none'; await refrescarDatos(); }
        async function modificarConsumos(v) { if(!socioActual) return; const n = (socioActual.consumiciones || 0) + v; if(n<0) return; await _supabase.from('socios').update({ consumiciones: n }).eq('dni', socioActual.dni); socioActual.consumiciones = n; document.getElementById('card-consumos').innerText = n; await refrescarDatos(); }
        async function descargarTarjeta() { const can = await html2canvas(document.getElementById('cardMain')); const a = document.createElement('a'); a.download = 'TARJETA.png'; a.href = can.toDataURL(); a.click(); }
        function autocompletarSocio() { const d = document.getElementById('dni').value.trim().toUpperCase(); const s = db.find(x => x.dni === d); if (s) { document.getElementById('nom').value = s.nombre; document.getElementById('cat').value = s.cat; } }
    </script>
</body>
</html>
