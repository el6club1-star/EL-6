<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA ELITE v6.3 - FINAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #d4af37; --bg: #ffffff; --card: #f8fafc; --text: #1e293b; --success: #22c55e; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        #pantallaLogin { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 99999; display: flex; justify-content: center; align-items: center; flex-direction: column; color: var(--gold); }
        #pantallaLogin input { padding: 15px; border: 1px solid var(--gold); background: #111; color: white; border-radius: 8px; text-align: center; margin-bottom: 15px; width: 250px; }
        .container { max-width: 1200px; margin: auto; background: var(--card); padding: 30px; border-radius: 20px; display:none; border: 1px solid #ddd; }
        header { text-align: center; border-bottom: 2px solid var(--gold); margin-bottom: 20px; padding-bottom: 10px; }
        
        /* REGISTRO Y RGPD A LA IZQUIERDA */
        .reg-box { display: grid; grid-template-columns: 1fr 1.5fr 1fr 1fr 1fr auto; gap: 10px; padding: 20px; background: #eee; border-radius: 15px; align-items: end; }
        .rgpd-box { grid-column: 1 / 3; display: flex; align-items: center; gap: 8px; font-size: 11px; margin-top: 5px; justify-content: flex-start; }
        
        input, select { padding: 10px; border-radius: 5px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; }
        .btn-add { background: var(--gold); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 10px; border-bottom: 2px solid #ddd; color: var(--gold); }
        td { padding: 10px; border-bottom: 1px solid #eee; }

        /* MODAL Y TARJETAS CON COLORES */
        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 5000; justify-content: center; align-items: center; flex-direction: column; }
        .card-vip { width: 300px; padding: 25px; border-radius: 20px; text-align: center; position: relative; color: white; border: 2px solid var(--gold); }
        #sello { display: none; position: absolute; top: 10px; right: -25px; background: var(--success); padding: 5px 30px; transform: rotate(45deg); font-size: 10px; }
        #qr-space { background: white; padding: 10px; margin: 10px auto; display: inline-block; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="pantallaLogin">
        <h1>CLUB EL 6</h1>
        <input type="password" id="pass" placeholder="CÓDIGO">
        <button onclick="login()" style="background:var(--gold); border:none; padding:10px 40px; border-radius:8px; cursor:pointer;">ENTRAR</button>
    </div>

    <div class="container" id="app">
        <header><h1>⚜️ CONTROL DE SOCIOS EL 6 ⚜️</h1></header>
        
        <div class="reg-box">
            <div><label>DNI</label><input type="text" id="dni" oninput="this.value=this.value.toUpperCase(); checkSocio();"></div>
            <div><label>NOMBRE</label><input type="text" id="nom"></div>
            <div><label>CUMPLE</label><input type="date" id="cumple"></div>
            <div><label>EMAIL</label><input type="email" id="mail"></div>
            <div><label>TIPO</label>
                <select id="cat">
                    <option>Estándar</option><option>Socio Plus</option><option>VIP Plata</option><option>VIP Gold</option><option>Elite</option>
                </select>
            </div>
            <button class="btn-add" onclick="registrar()">REGISTRAR</button>
            <div class="rgpd-box">
                <input type="checkbox" id="checkRGPD"> <label>Acepto Estatutos y Privacidad</label>
            </div>
        </div>

        <input type="text" id="bus" placeholder="🔍 BUSCAR..." onkeyup="render()" style="margin-top:20px; border:2px solid var(--gold);">
        
        <table>
            <thead><tr><th>DNI</th><th>NOMBRE</th><th>CATEGORÍA</th><th>ESTADO</th><th>ACCIONES</th></tr></thead>
            <tbody id="lista"></tbody>
        </table>
    </div>

    <div id="modal">
        <div class="card-vip" id="card">
            <div id="sello">PAGADO</div>
            <h2 style="margin:0">CLUB EL 6</h2>
            <div id="c-id" style="font-size:24px; font-weight:bold; margin:10px 0;"></div>
            <div id="qr-space"></div>
            <div style="background:rgba(255,255,255,0.1); padding:10px; border-radius:10px; margin-bottom:10px;">
                CONSUMOS: <span id="c-cons">0</span>
            </div>
            <div style="text-align:left; font-size:12px;">
                <p>SOCIO: <span id="c-nom" style="float:right"></span></p>
                <p>DNI: <span id="c-dni" style="float:right"></span></p>
            </div>
        </div>
        <div style="margin-top:15px; display:flex; gap:10px;">
            <button onclick="marcarPago()" style="background:var(--success); color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">PAGAR</button>
            <button onclick="descargar()" style="background:var(--gold); border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">DESCARGAR</button>
            <button onclick="document.getElementById('modal').style.display='none'" style="background:#555; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">CERRAR</button>
        </div>
    </div>

    <script>
        const supaUrl = 'https://rmskjegarvntuqpfzfbm.supabase.co';
        const supaKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJtc2tqZWdhcnZudHVxcGZ6ZmJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTI5OTg0MDAsImV4cCI6MjAyODU3NDQwMH0.hEqxPZNGDxpNZEnz7hrymg_cL8GvwHK';
        const supa = supabase.createClient(supaUrl, supaKey);

        let socios = []; let actual = null;

        async function cargar() {
            const { data } = await supa.from('socios').select('*');
            if(data) { socios = data; render(); }
        }

        async function registrar() {
            const d = document.getElementById('dni').value;
            const n = document.getElementById('nom').value;
            if(!d || !n) return alert("Faltan datos");
            
            const { data, error } = await supa.from('socios').upsert([{ 
                dni: d, nombre: n, cat: document.getElementById('cat').value,
                email: document.getElementById('mail').value, dentro: true 
            }], { onConflict: 'dni' }).select();

            if(error) return alert("REVISA LA SUB BASE: " + error.message);
            
            document.querySelectorAll('.reg-box input').forEach(i => i.value = "");
            document.getElementById('checkRGPD').checked = false;
            await cargar();
            ver(data[0]);
        }

        function ver(s) {
            actual = s;
            const c = document.getElementById('card');
            // APLICAR COLORES SEGÚN CATEGORÍA
            c.style.background = "#000"; c.style.color = "white"; c.style.border = "2px solid var(--gold)";
            if(s.cat === "VIP Plata") c.style.background = "linear-gradient(135deg, #71717a, #3f3f46)";
            if(s.cat === "VIP Gold") { c.style.background = "linear-gradient(135deg, #d4af37, #92721a)"; c.style.color = "black"; }
            if(s.cat === "Elite") { c.style.background = "linear-gradient(135deg, #1e293b, #000)"; c.style.border = "2px solid #ef4444"; }

            document.getElementById('c-id').innerText = "Nº " + (s.id || "---");
            document.getElementById('c-nom').innerText = s.nombre;
            document.getElementById('c-dni').innerText = s.dni;
            document.getElementById('c-cons').innerText = s.consumiciones || 0;
            document.getElementById('sello').style.display = s.pagado ? 'block' : 'none';
            
            document.getElementById('qr-space').innerHTML = "";
            const img = new Image(); img.src = new QRious({value: s.dni, size: 140}).toDataURL();
            document.getElementById('qr-space').appendChild(img);
            document.getElementById('modal').style.display = 'flex';
        }

        function render() {
            const b = document.getElementById('bus').value.toLowerCase();
            const f = socios.filter(s => s.nombre.toLowerCase().includes(b) || s.dni.includes(b));
            document.getElementById('lista').innerHTML = f.map(s => `<tr><td>${s.dni}</td><td>${s.nombre}</td><td>${s.cat}</td><td>${s.dentro?'🟢':'⚪'}</td><td><button onclick="reVer('${s.dni}')">TARJETA</button></td></tr>`).join('');
        }

        function reVer(dni) { ver(socios.find(x=>x.dni===dni)); }
        function login() { if(document.getElementById('pass').value === "1234") { document.getElementById('pantallaLogin').style.display='none'; document.getElementById('app').style.display='block'; cargar(); } }
        async function marcarPago() { const n = !actual.pagado; await supa.from('socios').update({pagado: n}).eq('dni', actual.dni); actual.pagado = n; document.getElementById('sello').style.display = n ? 'block' : 'none'; cargar(); }
        async function descargar() { const can = await html2canvas(document.getElementById('card')); const a = document.createElement('a'); a.download = 'TARJETA.png'; a.href = can.toDataURL(); a.click(); }
        function checkSocio() { const d = document.getElementById('dni').value; const s = socios.find(x=>x.dni===d); if(s) { document.getElementById('nom').value=s.nombre; document.getElementById('cat').value=s.cat; } }
    </script>
</body>
</html>
